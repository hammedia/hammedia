<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>HAM MEDIA Admin · Stars</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    :root {
      --pearl: #f9f7f3;
      --paper: #fffdf8;
      --ink: #1c1814;
      --muted: #766f66;
      --line: #ddd5ca;
      --blue: #7eb5e8;
      --blue-strong: #4c8fca;
      --danger: #b65342;
      --shadow: 0 18px 50px rgba(28, 24, 20, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--pearl);
      color: var(--ink);
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 42px;
    }

    .brand {
      display: grid;
      gap: 4px;
    }

    .brand strong {
      font-size: 18px;
    }

    .brand span {
      color: var(--muted);
      font-size: 13px;
    }

    .ghost-button,
    .star-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
    }

    .ghost-button {
      padding: 10px 14px;
      font-weight: 800;
    }

    .hero {
      margin-bottom: 28px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--blue-strong);
      font-size: 13px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.12;
    }

    .status {
      min-height: 24px;
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    .status.is-error {
      color: var(--danger);
    }

    .star-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .star-card {
      min-height: 150px;
      padding: 20px;
      text-align: left;
      box-shadow: 0 0 0 rgba(28, 24, 20, 0);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .star-card:hover {
      border-color: var(--blue-strong);
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .star-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 22px;
      line-height: 1.25;
    }

    .star-card span {
      color: var(--muted);
      line-height: 1.5;
    }

    .empty {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      padding: 28px;
      color: var(--muted);
    }

    @media (max-width: 860px) {
      .star-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 24px, 1120px);
        padding-top: 18px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .star-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <strong>HAM MEDIA Admin</strong>
        <span>hammedia.co.kr</span>
      </div>
      <button class="ghost-button" id="logout-button" type="button">로그아웃</button>
    </header>

    <section class="hero" aria-labelledby="dashboard-title">
      <p class="eyebrow">STARS</p>
      <h1 id="dashboard-title">수정할 별을 선택합니다</h1>
      <p class="status" id="status" aria-live="polite"></p>
    </section>

    <section class="star-grid" id="star-grid" aria-label="별 목록"></section>
  </main>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://jhdcznxbebekgninpdnt.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_5bNIQB2iil31WejPIJhftQ_i0FgMr7k";
    const CONFIG_READY = Boolean(SUPABASE_ANON_KEY);

    const statusEl = document.querySelector("#status");
    const starGrid = document.querySelector("#star-grid");
    const logoutButton = document.querySelector("#logout-button");

    const supabase = CONFIG_READY
      ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: { persistSession: true, autoRefreshToken: true }
        })
      : null;

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status${type ? ` is-${type}` : ""}`;
    }

    function renderEmpty(message) {
      starGrid.innerHTML = `<p class="empty">${message}</p>`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (character) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[character]);
    }

    async function isActiveAdmin(userId) {
      const { data, error } = await supabase
        .from("admin_profiles")
        .select("user_id,is_active")
        .eq("user_id", userId)
        .eq("is_active", true)
        .maybeSingle();

      if (error) throw error;
      return Boolean(data);
    }

    async function requireAdmin() {
      if (!CONFIG_READY) {
        setStatus("Supabase publishable 또는 anon key를 먼저 입력해 주세요.", "error");
        renderEmpty("설정값 입력 후 다시 열 수 있습니다.");
        return false;
      }

      const { data, error } = await supabase.auth.getUser();
      if (error || !data.user) {
        window.location.replace("index.html");
        return false;
      }

      if (!(await isActiveAdmin(data.user.id))) {
        await supabase.auth.signOut();
        window.location.replace("index.html");
        return false;
      }

      return true;
    }

    function renderStars(stars) {
      if (!stars.length) {
        renderEmpty("stars 테이블에 표시할 별 데이터가 없습니다.");
        return;
      }

      starGrid.innerHTML = stars.map((star) => `
        <button class="star-card" type="button" data-slug="${escapeHtml(star.slug)}">
          <strong>${escapeHtml(star.name_ko)}</strong>
          <span>${escapeHtml(star.code || star.star_key || star.slug)}</span>
        </button>
      `).join("");

      starGrid.querySelectorAll("[data-slug]").forEach((button) => {
        button.addEventListener("click", () => {
          window.location.href = `editor.html?star=${encodeURIComponent(button.dataset.slug)}`;
        });
      });
    }

    async function loadStars() {
      setStatus("별 목록을 불러오는 중입니다.");

      const { data, error } = await supabase
        .from("stars")
        .select("slug,star_key,code,name_ko,title,sort_order")
        .eq("is_active", true)
        .order("sort_order", { ascending: true });

      if (error) throw error;
      renderStars(data || []);
      setStatus("");
    }

    logoutButton.addEventListener("click", async () => {
      if (supabase) await supabase.auth.signOut();
      window.location.href = "index.html";
    });

    try {
      if (await requireAdmin()) {
        await loadStars();
      }
    } catch (error) {
      setStatus(error.message || "별 목록을 불러오지 못했습니다.", "error");
      renderEmpty("Supabase 스키마, RLS, admin_profiles 등록 상태를 확인해 주세요.");
    }
  </script>
</body>
</html>
