<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>공유 선반 실측 샘플 | HAM MEDIA</title>
    <meta name="description" content="HAM MEDIA 공유 선반 세팅 확인을 위한 임시 샘플 문서입니다.">
    <style>
      :root {
        --paper-deep: #f5f3ee;
        --paper: #fffefb;
        --ink: #1c1814;
        --muted: #4a423c;
        --line: rgba(28, 24, 20, .14);
        --accent: #7eb5e8;
        --action: #00704a;
        --shadow: 0 1px 2px rgba(28, 24, 20, .05), 0 18px 48px rgba(28, 24, 20, .08);
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--paper-deep);
        color: var(--ink);
        font-family: "Pretendard", "Pretendard Variable", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
        line-height: 1.65;
        -webkit-font-smoothing: antialiased;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(126, 181, 232, .18), transparent 34rem),
          var(--paper-deep);
      }

      .share-shell {
        width: min(100%, 820px);
        margin: 0 auto;
        padding: 20px 16px 56px;
      }

      .share-document {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .share-header {
        padding: clamp(24px, 6vw, 44px);
        border-bottom: 1px solid var(--line);
      }

      .share-brand {
        margin: 0 0 18px;
        color: var(--action);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: .08em;
      }

      .share-header h1 {
        margin: 0;
        font-size: clamp(30px, 8vw, 54px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .share-date {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      .share-content {
        padding: clamp(24px, 6vw, 44px);
      }

      .share-content h2 {
        margin: 36px 0 10px;
        font-size: clamp(21px, 5vw, 30px);
        line-height: 1.18;
        letter-spacing: 0;
      }

      .share-content h2:first-child {
        margin-top: 0;
      }

      .share-content p,
      .share-content li {
        font-size: 17px;
      }

      .share-content p {
        margin: 0 0 16px;
      }

      .share-content ul {
        margin: 0 0 18px;
        padding-left: 1.2em;
      }

      .share-note {
        margin-top: 32px;
        padding: 16px;
        border-left: 4px solid var(--accent);
        background: rgba(126, 181, 232, .12);
        border-radius: 14px;
        color: var(--muted);
        font-size: 15px;
      }

      @media (max-width: 560px) {
        .share-shell {
          padding: 12px 10px 36px;
        }

        .share-document {
          border-radius: 18px;
        }

        .share-content p,
        .share-content li {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="share-shell">
      <article class="share-document">
        <header class="share-header">
          <p class="share-brand">HAM MEDIA SHARE</p>
          <h1>공유 선반 실측 샘플</h1>
          <p class="share-date">2026-07-07</p>
        </header>

        <section class="share-content">
          <h2>폰에서 보는 확인용 문서</h2>
          <p>이 페이지는 HAM MEDIA 매장 공유 선반이 제대로 열리는지 확인하기 위한 임시 샘플입니다.</p>
          <p>검색에 걸리지 않도록 페이지 안에는 noindex 메타가 들어 있고, sitemap에는 이 경로를 넣지 않습니다.</p>

          <h2>확인할 것</h2>
          <ul>
            <li>휴대폰에서 제목과 날짜가 먼저 보이는지</li>
            <li>본문 줄 간격이 답답하지 않은지</li>
            <li>공개 메뉴에서 이 문서로 들어오는 링크가 없는지</li>
          </ul>

          <p class="share-note">햄PD 확인 후 이 샘플은 삭제합니다.</p>
        </section>
      </article>
    </main>
  </body>
</html>
