<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>문서 제목 | HAM MEDIA 공유 선반</title>
    <meta name="description" content="HAM MEDIA 공유 선반의 임시 공유 문서입니다.">
    <style>
      :root {
        --paper-deep: #f5f3ee;
        --paper: #fffefb;
        --ink: #1c1814;
        --muted: #4a423c;
        --line: rgba(28, 24, 20, .14);
        --accent: #7eb5e8;
        --action: #00704a;
        --shadow: 0 1px 2px rgba(28, 24, 20, .05), 0 18px 48px rgba(28, 24, 20, .08);
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--paper-deep);
        color: var(--ink);
        font-family: "Pretendard", "Pretendard Variable", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
        line-height: 1.65;
        -webkit-font-smoothing: antialiased;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(126, 181, 232, .18), transparent 34rem),
          var(--paper-deep);
      }

      .share-shell {
        width: min(100%, 820px);
        margin: 0 auto;
        padding: 20px 16px 56px;
      }

      .share-document {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .share-header {
        padding: clamp(24px, 6vw, 44px);
        border-bottom: 1px solid var(--line);
      }

      .share-brand {
        margin: 0 0 18px;
        color: var(--action);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: .08em;
      }

      .share-header h1 {
        margin: 0;
        font-size: clamp(30px, 8vw, 54px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .share-date {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      .share-content {
        padding: clamp(24px, 6vw, 44px);
      }

      .share-content h2 {
        margin: 36px 0 10px;
        font-size: clamp(21px, 5vw, 30px);
        line-height: 1.18;
        letter-spacing: 0;
      }

      .share-content h2:first-child {
        margin-top: 0;
      }

      .share-content p,
      .share-content li {
        font-size: 17px;
      }

      .share-content p {
        margin: 0 0 16px;
      }

      .share-content ul,
      .share-content ol {
        margin: 0 0 18px;
        padding-left: 1.2em;
      }

      .share-note {
        margin-top: 32px;
        padding: 16px;
        border-left: 4px solid var(--accent);
        background: rgba(126, 181, 232, .12);
        border-radius: 14px;
        color: var(--muted);
        font-size: 15px;
      }

      @media (max-width: 560px) {
        .share-shell {
          padding: 12px 10px 36px;
        }

        .share-document {
          border-radius: 18px;
        }

        .share-content p,
        .share-content li {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="share-shell">
      <article class="share-document">
        <header class="share-header">
          <p class="share-brand">HAM MEDIA SHARE</p>
          <h1>문서 제목</h1>
          <p class="share-date">2026-07-07</p>
        </header>

        <section class="share-content">
          <h2>섹션 제목</h2>
          <p>여기에 공유할 본문을 넣습니다. 내부 경로, 고객정보, 계약, 가격, 민감정보는 넣지 않습니다.</p>

          <h2>목록 예시</h2>
          <ul>
            <li>필요한 말만 짧게 정리합니다.</li>
            <li>폰에서 먼저 읽히는 길이와 줄 간격을 유지합니다.</li>
            <li>다 쓰면 햄PD 지시로 삭제합니다.</li>
          </ul>

          <p class="share-note">이 문서는 링크로만 전달하는 임시 공유 문서입니다.</p>
        </section>
      </article>
    </main>
  </body>
</html>
