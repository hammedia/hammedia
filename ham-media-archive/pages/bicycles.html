<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>자전거별 | HAM MEDIA</title>
    <link rel="stylesheet" href="../assets/css/styles.css?v=bicycle-stamp-1">
  </head>
  <body class="world-body">
    <main class="world-page room-page room-house-page bicycle-room">
      <header class="room-header">
        <div class="room-stamp-row" aria-label="자전거별 도착 스탬프">
          <p class="room-star-code">LPH-B613-04</p>
          <img class="room-arrival-stamp is-wide-stamp" src="../assets/images/bicycles/stamps/lph-b613-04-bicycle-stamp.png" alt="LPH-B613-04 자전거별 도착 스탬프">
        </div>
        <h1>자전거별</h1>
      </header>

      <section class="room-welcome" aria-label="자전거별 첫 문장">
        <span class="room-welcome-mark" aria-hidden="true"></span>
        <div class="room-welcome-copy">
          <p class="room-welcome-label">방의 첫 문장</p>
          <blockquote>
            <p>두 발로 가는 건 딴생각하면 큰일 난다. 머리가 복잡한 날엔 다리를 믿고 그냥 전진했다. 그렇게 몸을 비우는 법이, 지금도 나를 재운다.</p>
            <p>비워야 채워진다는 걸 아는 사람이라면.</p>
          </blockquote>
        </div>
      </section>
      <section class="room-hero" aria-label="자전거 대표 사진">
        <figure class="bicycle-featured">
          <img class="room-photo-image bicycle-photo-slot" src="../assets/images/bicycles/gallery-img-4187.jpg" alt="미시령 산길을 오르는 자전거 라이더">
          <figcaption>미시령을 넘어가며 내가 알고 있던 욕을 다 했다. 그리고 내려오며 천국을 맛봤다. 그렇게 추월하던 바이크를 보며, 꼭 나도 바이크로 미시령을 오르기로 했다.</figcaption>
        </figure>
      </section>

      <section class="room-house" aria-label="자전거별">
        <div class="room-section-heading">
          <p class="room-section-label">자전거별</p>
          <p class="room-section-help">대표 사진을 지나 별 안으로 들어오면, 글과 사진과 자료를 따로 봅니다.</p>
        </div>

        <nav class="room-house-nav" aria-label="자전거별 메뉴">
          <button class="room-house-door" type="button" data-house-target="bicycle-writing-room">
            <strong>글</strong>
            <span>2개 기록 보기</span>
          </button>
          <button class="room-house-door" type="button" data-house-target="bicycle-photo-room">
            <strong>사진</strong>
            <span>7장 보기</span>
          </button>
          <button class="room-house-door" type="button" disabled>
            <strong>자료</strong>
            <span>나중에 열 방</span>
          </button>
        </nav>
      </section>

      <section class="room-house-panel" id="bicycle-writing-room" aria-label="자전거 글 목록" hidden>
        <div class="room-house-panel-header">
          <p class="room-section-label">글</p>
          <h2>다리를 믿고 전진한 기록</h2>
          <button class="room-house-back" type="button">자전거별로 돌아가기</button>
        </div>

        <div class="room-card-list">
          <article class="room-post room-card room-record-unit bicycle-record-card">
            <figure class="room-record-figure">
              <img class="room-photo-image room-record-photo" src="../assets/images/bicycles/essay-before-ride.jpg" alt="자전거 옆에서 라이딩을 준비하는 모습">
              <figcaption class="room-record-caption">
                <span class="room-card-meta">글</span>
                <strong class="room-card-title">다리를 믿고 나아가는 시간</strong>
                <span class="room-card-note">자전거 / 전진 / 비움</span>
                <span>복잡한 생각보다 먼저 움직이는 몸이 있다. 그때 마음도 같이 비워진다.</span>
              </figcaption>
            </figure>
          </article>

          <article class="room-post room-card room-record-unit bicycle-record-card">
            <figure class="room-record-figure">
              <img class="room-photo-image room-record-photo" src="../assets/images/bicycles/photo-bib-detail.jpg" alt="자전거 프레임과 번호표가 가까이 보이는 사진">
              <figcaption class="room-record-caption">
                <span class="room-card-meta">사진</span>
                <strong class="room-card-title">몸이 먼저 기억하는 번호</strong>
                <span class="room-card-note">라이딩 / 기록 / 집중</span>
                <span>속도보다 집중이 먼저다. 번호와 프레임 사이에 남은 몸의 기록.</span>
              </figcaption>
            </figure>
          </article>
        </div>
      </section>

      <section class="room-house-panel bicycle-gallery" id="bicycle-photo-room" aria-label="자전거 갤러리" hidden>
        <div class="room-house-panel-header">
          <p class="room-section-label">사진</p>
          <h2>길 위에서 몸이 기억한 장면</h2>
          <button class="room-house-back" type="button">자전거별로 돌아가기</button>
        </div>

        <div class="room-section-heading">
          <p class="room-section-label">몸을 비우며 지나온 길</p>
        </div>
        <div class="bicycle-gallery-grid">
          <figure><img class="room-photo-image bicycle-gallery-photo" src="../assets/images/bicycles/gallery-img-7462.jpg" alt="자전거 사진 1"></figure>
          <figure><img class="room-photo-image bicycle-gallery-photo" src="../assets/images/bicycles/hero-city-ride.jpg" alt="자전거 사진 2"></figure>
          <figure><img class="room-photo-image bicycle-gallery-photo" src="../assets/images/bicycles/gallery-img-6681.jpg" alt="자전거 사진 3"></figure>
          <figure><img class="room-photo-image bicycle-gallery-photo" src="../assets/images/bicycles/gallery-img-7636.jpg" alt="자전거 사진 4"></figure>
          <figure><img class="room-photo-image bicycle-gallery-photo" src="../assets/images/bicycles/gallery-img-5757.jpg" alt="자전거 사진 5"></figure>
          <figure>
            <img class="room-photo-image bicycle-gallery-photo" src="../assets/images/bicycles/gallery-img-5752.jpg" alt="차에 실린 자전거 사진">
            <figcaption>스웨덴산 사브와 대만산 자이언트(GIANT), 그리고 한국산 햄.</figcaption>
          </figure>
          <figure><img class="room-photo-image bicycle-gallery-photo" src="../assets/images/bicycles/gallery-1f9a31a9.jpg" alt="자전거 사진 7"></figure>
        </div>

        <aside class="room-gallery-detail room-house-photo-detail" aria-live="polite" hidden></aside>
      </section>

      <nav class="room-related" aria-label="별 이동">
        <a class="room-soft-link" href="spaces.html">다음 별: 공간별</a>
        <a class="room-soft-link" href="../index.html#about-constellation">별자리로 돌아가기</a>
      </nav>

      <a class="back-link" href="../index.html">HAM MEDIA</a>
    </main>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
