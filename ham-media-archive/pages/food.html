  <body class="world-body">
    <main class="world-page room-page food-room">
      <a class="room-top-link" href="/#about-constellation">← 별자리</a>
      <header class="room-header">
        <p class="eyebrow">Food</p>
        <h1>Food / 음식</h1>
        <p class="room-intro">감각을 익힌 별</p>
      </header>

      <section class="room-welcome" aria-label="음식 방 웰컴 글">
        <span class="room-welcome-mark" aria-hidden="true"></span>
        <div class="room-welcome-copy">
          <p class="room-welcome-label">Welcome note</p>
          <blockquote>
            <p>일본에서, 미국에서, 한국에서. 평생 사람 입으로 들어가 마음에 담기는 일을 했다. 커피로 맛과 향을 훈련하며 세상의 맛을 익혔다. 혀로 익힌 그 감각이, 콘텐츠를 보는 눈으로 이어졌다.</p>
            <p>감각은 타고나는 게 아니라 훈련된다. 보는 눈도 그렇게 길렀다.</p>
          </blockquote>
        </div>
      </section>
      <section class="room-hero" aria-label="음식 대표 사진">
        <figure class="food-featured">
          <img class="room-photo-image food-photo-slot" src="../assets/images/food/hero-cafe-table-coffee.jpg" alt="카페 테이블 위에 놓인 커피와 컵">
          <figcaption>커피 한 잔과 테이블. 감각은 이렇게 매일 훈련됐다.</figcaption>
        </figure>
      </section>

      <section class="room-posts" aria-label="음식 글 목록">
        <div class="room-section-heading">
          <p class="room-section-label">글 / 사진 기록</p>
          <p class="room-section-help">기존 글과 사진을 차례로 정리할 자리입니다.</p>
        </div>

        <div class="room-card-list">
          <article class="room-post room-card room-record-unit food-record-card">
            <figure class="room-record-figure">
              <img class="room-photo-image room-record-photo" src="../assets/images/food/essay-delacasa-trace.jpg" alt="델라카사의 흔적이 보이는 음식 공간 사진">
              <figcaption class="room-record-caption">
                <span class="room-card-meta">Essay</span>
                <strong class="room-card-title">사람 입으로 들어가 마음에 담기는 일</strong>
                <span class="room-card-note">음식 / 서비스 / 기억</span>
                <span>맛은 입에만 남지 않는다. 서비스를 지나 기억의 모양으로 남는다.</span>
              </figcaption>
            </figure>
          </article>

          <article class="room-post room-card room-record-unit food-record-card">
            <figure class="room-record-figure">
              <img class="room-photo-image room-record-photo" src="../assets/images/food/photo-plate-texture.jpg" alt="음식의 질감과 접시가 보이는 사진">
              <figcaption class="room-record-caption">
                <span class="room-card-meta">Photo</span>
                <strong class="room-card-title">맛을 익힌 감각</strong>
                <span class="room-card-note">음식 / 접시 / 디테일</span>
                <span>접시 위의 질감과 여백을 오래 보다 보면, 보는 눈도 조금씩 훈련된다.</span>
              </figcaption>
            </figure>
          </article>
        </div>
      </section>
