  <body class="world-body">
    <main class="world-page room-page fountain-room">
      <a class="room-top-link" href="../index.html#about-constellation">← 별자리</a>
      <header class="room-header">
        <p class="eyebrow">Fountain Pens</p>
        <h1>Fountain Pens / 만년필</h1>
        <p class="room-intro">살아남은 별</p>
      </header>

      <section class="room-welcome" aria-label="만년필 방 웰컴 글">
        <span class="room-welcome-mark" aria-hidden="true"></span>
        <div class="room-welcome-copy">
          <p class="room-welcome-label">Welcome note</p>
          <blockquote>
            <p>글이 좋아서가 아니었다. 마음에 쌓인 걸 몸 밖으로 빼내려 펜을 잡았고, 그렇게 겨우 살아났다.</p>
            <p>지금도 무거운 날엔 펜부터 든다. 당신도 그렇다면, 우린 통한다.</p>
          </blockquote>
          <p class="room-welcome-note">안에 있는 걸 밖으로 꺼내는 일 — 그게 내 직업이 된 것도 우연은 아닐 거다.</p>
        </div>
      </section>
      <section class="room-hero" aria-label="만년필 대표 사진">
        <figure class="fountain-featured">
          <img class="room-photo-image fountain-photo-slot" src="../assets/images/fountain-pens/hero-window-table.jpg" alt="창가 테이블 위에 놓인 만년필과 노트, 커피">
          <figcaption>창가에 놓인 펜과 노트. 마음을 밖으로 꺼내던 자리.</figcaption>
        </figure>
      </section>

      <section class="room-posts" aria-label="만년필 글 목록">
        <div class="room-section-heading">
          <p class="room-section-label">글 / 사진 기록</p>
          <p class="room-section-help">손으로 쓴 문장과, 그 곁에 남은 사진을 모아둡니다.</p>
        </div>

        <div class="room-card-list">
          <article class="room-post room-card room-record-unit fountain-record-card">
            <figure class="room-record-figure">
              <img class="room-photo-image room-record-photo" src="../assets/images/fountain-pens/essay-handwriting-pens.jpg" alt="손글씨와 만년필 두 자루">
              <figcaption class="room-record-caption">
                <span class="room-card-meta">Essay</span>
                <strong class="room-card-title">마음 밖으로 꺼낸 문장들</strong>
                <span class="room-card-note">손글씨 / 만년필 / 기록</span>
                <span>손으로 적어야 남는 문장들이 있다.</span>
              </figcaption>
            </figure>
          </article>

          <article class="room-post room-card room-record-unit fountain-record-card">
            <figure class="room-record-figure">
              <img class="room-photo-image room-record-photo" src="../assets/images/fountain-pens/photo-nib-closeup.jpg" alt="잉크가 묻은 만년필 펜촉 클로즈업">
              <figcaption class="room-record-caption">
                <span class="room-card-meta">Photo</span>
                <strong class="room-card-title">펜촉과 잉크의 흔적</strong>
                <span class="room-card-note">펜촉 / 잉크 / 종이</span>
                <span>펜촉 끝에 남는 감각.</span>
              </figcaption>
            </figure>
          </article>

          <article class="room-post room-card room-record-unit fountain-record-card room-record-extra">
            <figure class="room-record-figure">
              <img class="room-photo-image room-record-photo" src="../assets/images/fountain-pens/archive-ink-test.jpg" alt="잉크병, 컬러 테스트, 펜, 종이, 티슈">
              <figcaption class="room-record-caption">
                <span class="room-card-meta">Photo</span>
                <strong class="room-card-title">잉크와 종이, 그리고 써본 흔적</strong>
                <span class="room-card-note">펜촉 / 잉크 / 종이</span>
                <span>잉크와 종이, 그리고 써본 흔적.</span>
              </figcaption>
            </figure>
          </article>
        </div>
      </section>
