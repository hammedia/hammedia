<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cameras / 카메라 | HAM MEDIA</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
  </head>
  <body class="world-body">
    <main class="world-page room-page room-house-page camera-room">
      <header class="room-header">
        <p class="eyebrow">Cameras</p>
        <h1>Cameras / 카메라</h1>
        <p class="room-star-code">LPH B-613-09</p>
        <p class="room-intro">무엇을 담을지 보는 별</p>
      </header>

      <section class="room-welcome" aria-label="카메라 방 웰컴 글">
        <span class="room-welcome-mark" aria-hidden="true"></span>
        <div class="room-welcome-copy">
          <p class="room-welcome-label">방의 첫 문장</p>
          <blockquote>
            <p>찍는 것보다, 무엇을 찍을지 고르는 순간이 좋았다. 그 눈이 카메라를 들게 했고, 지금도 그 눈으로 화면을 고른다.</p>
            <p>무엇을 담을지 아는 게 먼저다. 영상은 거기서 시작된다.</p>
          </blockquote>
        </div>
      </section>
      <section class="room-hero" aria-label="카메라 대표 사진">
        <figure class="camera-featured">
          <img class="room-photo-image camera-photo-slot" src="../assets/images/cameras/hero-camera-notebook.jpg" alt="카메라와 손글씨 노트가 함께 놓인 책상">
          <figcaption>카메라와 노트. 무엇을 담을지 먼저 고르는 자리.</figcaption>
        </figure>
      </section>

      <section class="room-house" aria-label="카메라의 집">
        <div class="room-section-heading">
          <p class="room-section-label">카메라의 집</p>
          <p class="room-section-help">현관에서 대표 사진을 보고, 안쪽 방으로 들어가 글과 사진을 따로 봅니다.</p>
        </div>

        <nav class="room-house-nav" aria-label="카메라의 집 방 목록">
          <button class="room-house-door" type="button" data-house-target="camera-writing-room">
            <strong>글방</strong>
            <span>2개 기록 보기</span>
          </button>
          <button class="room-house-door" type="button" data-house-target="camera-photo-room">
            <strong>사진방</strong>
            <span>6장 보기</span>
          </button>
          <button class="room-house-door" type="button" disabled>
            <strong>자료방</strong>
            <span>나중에 열 방</span>
          </button>
        </nav>
      </section>

      <section class="room-house-panel" id="camera-writing-room" aria-label="카메라 글 목록" hidden>
        <div class="room-house-panel-header">
          <p class="room-section-label">글방</p>
          <h2>무엇을 담을지 고른 글</h2>
          <button class="room-house-back" type="button">카메라의 집으로 돌아가기</button>
        </div>

        <div class="room-card-list">
          <article class="room-post room-card room-record-unit camera-record-card">
            <figure class="room-record-figure">
              <img class="room-photo-image room-record-photo" src="../assets/images/cameras/essay-shooting-setup.jpg" alt="촬영 조명과 삼각대를 세팅하는 현장">
              <figcaption class="room-record-caption">
                <span class="room-card-meta">글</span>
                <strong class="room-card-title">무엇을 담을지 고르는 현장</strong>
                <span class="room-card-note">촬영 준비 / 프레임 / 현장</span>
                <span>촬영 준비 / 프레임 / 현장</span>
              </figcaption>
            </figure>
          </article>

          <article class="room-post room-card room-record-unit camera-record-card">
            <figure class="room-record-figure">
              <img class="room-photo-image room-record-photo" src="../assets/images/cameras/photo-frame-eye.jpg" alt="거울 앞에서 카메라를 들고 프레임을 보는 모습">
              <figcaption class="room-record-caption">
                <span class="room-card-meta">사진</span>
                <strong class="room-card-title">프레임을 보는 눈</strong>
                <span class="room-card-note">카메라 / 렌즈 / 시선</span>
                <span>카메라 / 렌즈 / 시선</span>
              </figcaption>
            </figure>
          </article>
        </div>
      </section>

      <section class="room-house-panel camera-gallery" id="camera-photo-room" aria-label="카메라 갤러리" hidden>
        <div class="room-house-panel-header">
          <p class="room-section-label">사진방</p>
          <h2>카메라와 시선이 남긴 사진들</h2>
          <button class="room-house-back" type="button">카메라의 집으로 돌아가기</button>
        </div>

        <div class="room-section-heading">
          <p class="room-section-label">카메라와 현장의 흔적</p>
        </div>
        <div class="camera-gallery-grid">
          <figure>
            <img class="room-photo-image camera-gallery-photo" src="../assets/images/cameras/gallery-camera-self-portrait.jpg" alt="엘리베이터 거울 앞에서 카메라를 든 모습">
          </figure>
          <figure>
            <img class="room-photo-image camera-gallery-photo" src="../assets/images/cameras/gallery-gimbal-screen.jpg" alt="짐벌 카메라 화면에 얼굴이 잡힌 모습">
          </figure>
          <figure>
            <img class="room-photo-image camera-gallery-photo" src="../assets/images/cameras/gallery-lumix-leica.jpg" alt="라이카 렌즈가 달린 루믹스 카메라">
          </figure>
          <figure>
            <img class="room-photo-image camera-gallery-photo" src="../assets/images/cameras/gallery-desk-setup-wide.jpg" alt="카메라와 노트가 놓인 작업 책상">
          </figure>
          <figure>
            <img class="room-photo-image camera-gallery-photo" src="../assets/images/cameras/gallery-lens-pair.jpg" alt="카메라와 렌즈가 놓인 모습">
          </figure>
          <figure>
            <img class="room-photo-image camera-gallery-photo" src="../assets/images/cameras/gallery-action-camera-note.jpg" alt="액션 카메라와 노트가 놓인 책상">
          </figure>
        </div>

        <aside class="room-gallery-detail room-house-photo-detail" aria-live="polite" hidden></aside>
      </section>

      <nav class="room-related" aria-label="취미방 이동">
        <a class="room-soft-link" href="fountain-pens.html">다음 취미방: 만년필</a>
        <a class="room-soft-link" href="../index.html#about-constellation">별자리로 돌아가기</a>
      </nav>

      <a class="back-link" href="../index.html">HAM MEDIA</a>
    </main>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
