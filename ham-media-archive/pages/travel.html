<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Travel / 여행 | HAM MEDIA</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
  </head>
  <body class="world-body">
    <main class="world-page room-page travel-room">
      <a class="room-top-link" href="/#about-constellation">← 별자리</a>
      <header class="room-header">
        <p class="eyebrow">Travel</p>
        <h1>Travel / 여행</h1>
        <p class="room-intro">자리를 옮겨 보는 별</p>
      </header>

      <section class="room-welcome" aria-label="여행 방 웰컴 글">
        <span class="room-welcome-mark" aria-hidden="true"></span>
        <div class="room-welcome-copy">
          <p class="room-welcome-label">Welcome note</p>
          <blockquote>
            <p>서 있는 자리가 바뀌면 보이는 게 달라진다. 모르는 곳에서 다른 생각을 하면, 거기서 뜻이 생긴다. 자리를 옮겨 보는 그 버릇이, 내 번역의 방식이 됐다.</p>
            <p>전문가의 자리에서 보던 걸 청중의 자리로 옮겨 보는 일. 그게 내가 하는 번역이다.</p>
          </blockquote>
        </div>
      </section>
      <section class="room-hero" aria-label="여행 대표 사진">
        <figure class="travel-featured">
          <img class="room-photo-image travel-photo-slot" src="../assets/images/travel/hero-station-suitcase-waiting.jpg" alt="기차역에서 캐리어를 곁에 두고 기다리는 사람">
          <figcaption>길 위에서, 자리를 옮기면 생각도 바뀐다.</figcaption>
        </figure>
      </section>

      <section class="room-posts" aria-label="여행 글 목록">
        <div class="room-section-heading">
          <p class="room-section-label">글 / 사진 기록</p>
          <p class="room-section-help">기존 글과 사진을 차례로 정리할 자리입니다.</p>
        </div>

        <div class="room-card-list">
          <article class="room-post room-card room-record-unit travel-record-card">
            <figure class="room-record-figure">
              <img class="room-photo-image room-record-photo" src="../assets/images/travel/essay-place-car-stay.jpg" alt="낯선 장소와 차, 머무는 공간이 보이는 사진">
              <figcaption class="room-record-caption">
                <span class="room-card-meta">Essay</span>
                <strong class="room-card-title">자리를 옮겨 보는 일</strong>
                <span class="room-card-note">이동 / 장소 / 생각</span>
                <span>낯선 장소에 잠시 머물면, 익숙한 생각도 다른 각도로 놓인다.</span>
              </figcaption>
            </figure>
          </article>

          <article class="room-post room-card room-record-unit travel-record-card">
            <figure class="room-record-figure">
              <img class="room-photo-image room-record-photo" src="../assets/images/travel/photo-seaside-walk.jpg" alt="바닷가에서 걷는 장면">
              <figcaption class="room-record-caption">
                <span class="room-card-meta">Photo</span>
                <strong class="room-card-title">낯선 곳에서 보이는 것들</strong>
                <span class="room-card-note">바다 / 길 / 시선</span>
                <span>길이 바뀌면 시선도 바뀐다. 같은 사람도 다른 풍경 안에서는 다르게 보인다.</span>
              </figcaption>
            </figure>
          </article>
        </div>
      </section>

      <section class="travel-gallery" aria-label="여행 갤러리">
        <div class="room-section-heading">
          <p class="room-section-label">자리를 옮기며 남은 길의 흔적</p>
        </div>
        <div class="travel-gallery-grid">
          <figure>
            <img class="room-photo-image travel-gallery-photo" src="../assets/images/travel/gallery-img-5134.jpg" alt="길과 장소의 여행 사진 1">
          </figure>
          <figure>
            <img class="room-photo-image travel-gallery-photo" src="../assets/images/travel/gallery-img-3233.jpg" alt="길과 장소의 여행 사진 2">
          </figure>
          <figure>
            <img class="room-photo-image travel-gallery-photo" src="../assets/images/travel/gallery-img-1104.jpg" alt="길과 장소의 여행 사진 3">
          </figure>
          <figure>
            <img class="room-photo-image travel-gallery-photo" src="../assets/images/travel/gallery-img-0182.jpg" alt="여행 중 가족 또는 동행과 함께한 작은 기록">
          </figure>
          <figure>
            <img class="room-photo-image travel-gallery-photo" src="../assets/images/travel/gallery-img-3526.jpg" alt="여행 기록 말미에 둔 일러스트 느낌의 이미지">
          </figure>
        </div>
      </section>

      <nav class="room-related" aria-label="취미방 이동">
        <a class="room-soft-link" href="music-audio.html">다음 취미방: 음악·오디오</a>
        <a class="room-soft-link" href="/#about-constellation">별자리로 돌아가기</a>
      </nav>

      <a class="back-link" href="/">HAM MEDIA</a>
    </main>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
